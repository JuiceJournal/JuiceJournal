<!DOCTYPE html>
<html lang="en" data-overlay-visibility="waiting">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none';">
  <title>Juice Journal Overlay</title>
  <style>
    :root {
      --overlay-bg: rgba(10, 12, 16, 0.74);
      --overlay-border: rgba(230, 177, 92, 0.38);
      --overlay-text: #f7ead2;
      --overlay-muted: #b79f78;
      --overlay-accent: #e7a94f;
      --overlay-shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--overlay-text);
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      pointer-events: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .overlay-card {
      width: 100%;
      min-height: 88px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--overlay-border);
      border-radius: 16px;
      background:
        radial-gradient(circle at 14% 0%, rgba(231, 169, 79, 0.24), transparent 32%),
        linear-gradient(135deg, rgba(16, 18, 24, 0.88), var(--overlay-bg));
      box-shadow: 0 16px 34px var(--overlay-shadow);
      backdrop-filter: blur(14px);
      opacity: 1;
      transform: translateX(0) scale(1);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .overlay-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(231, 169, 79, 0.16), transparent 38%, rgba(255, 255, 255, 0.06));
      mix-blend-mode: screen;
    }

    .overlay-content {
      position: relative;
      display: grid;
      gap: 6px;
      padding: 13px 15px 12px;
    }

    .overlay-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--overlay-accent);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .overlay-kicker-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .overlay-kicker-label::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 12px currentColor;
    }

    .overlay-pin {
      border: 1px solid rgba(231, 169, 79, 0.28);
      border-radius: 999px;
      background: rgba(12, 14, 18, 0.72);
      color: var(--overlay-text);
      padding: 4px 9px;
      font: inherit;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      pointer-events: auto;
      transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease;
    }

    .overlay-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      pointer-events: auto;
    }

    .overlay-dismiss {
      border: 1px solid rgba(242, 141, 132, 0.28);
      border-radius: 999px;
      background: rgba(12, 14, 18, 0.72);
      color: var(--overlay-text);
      padding: 4px 9px;
      font: inherit;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      pointer-events: auto;
      transition: border-color 120ms ease, background-color 120ms ease, color 120ms ease;
    }

    .overlay-dismiss[hidden] {
      display: none;
    }

    .overlay-pin[hidden] {
      display: none;
    }

    .overlay-pin[aria-pressed="true"] {
      border-color: rgba(247, 234, 210, 0.52);
      background: rgba(231, 169, 79, 0.22);
      color: #fff4df;
    }

    .overlay-primary {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .overlay-secondary-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      color: var(--overlay-muted);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: 12px;
    }

    .overlay-secondary,
    .overlay-meta {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .overlay-meta {
      flex: 0 0 auto;
      color: #e4c48c;
    }

    .overlay-start-form {
      display: grid;
      gap: 10px;
      margin-top: 8px;
      pointer-events: auto;
    }

    .overlay-start-form[hidden] {
      display: none;
    }

    .overlay-field {
      display: grid;
      gap: 5px;
      color: var(--overlay-muted);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .overlay-field input,
    .overlay-field select {
      width: 100%;
      border: 1px solid rgba(231, 191, 112, 0.38);
      border-radius: 10px;
      background: rgba(5, 6, 8, 0.84);
      color: var(--overlay-text);
      font: 700 13px "Trebuchet MS", Verdana, sans-serif;
      letter-spacing: 0.02em;
      outline: none;
      padding: 9px 10px;
    }

    .overlay-field input:focus,
    .overlay-field select:focus {
      border-color: rgba(247, 234, 210, 0.78);
      box-shadow: 0 0 0 2px rgba(231, 191, 112, 0.18);
    }

    .overlay-start-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .overlay-start-action {
      border: 1px solid rgba(231, 191, 112, 0.4);
      border-radius: 999px;
      background: rgba(12, 14, 18, 0.78);
      color: var(--overlay-text);
      cursor: pointer;
      font: 800 10px "Trebuchet MS", Verdana, sans-serif;
      letter-spacing: 0.14em;
      padding: 9px 13px;
      text-transform: uppercase;
    }

    .overlay-start-action.primary {
      background: linear-gradient(135deg, #d7b46a, #a97732);
      color: #120d08;
    }

    .overlay-start-action:disabled {
      cursor: wait;
      opacity: 0.64;
    }

    [data-overlay-state="waiting"] {
      --overlay-accent: #8bb2d8;
      --overlay-border: rgba(139, 178, 216, 0.28);
    }

    [data-overlay-state="hidden"] {
      opacity: 0;
      transform: translateX(110%) scale(0.98);
    }

    [data-overlay-mode="map-result"][data-overlay-state="visible"] {
      animation: slideInFromRight 220ms cubic-bezier(0.2, 0.84, 0.24, 1) both;
    }

    [data-overlay-mode="start-map-prompt"][data-overlay-state="visible"] {
      --overlay-accent: #e7bf70;
      --overlay-border: rgba(231, 191, 112, 0.44);
      animation: slideInFromRight 220ms cubic-bezier(0.2, 0.84, 0.24, 1) both;
    }

    [data-overlay-mode="start-map-prompt"] {
      min-height: 250px;
    }

    [data-overlay-exiting="true"] {
      animation: slideOutToRight 180ms ease-in both;
    }

    [data-overlay-mode="map-result"][data-overlay-tone="positive"] {
      --overlay-accent: #74d39d;
      --overlay-border: rgba(116, 211, 157, 0.34);
      --overlay-muted: #b9d6c3;
    }

    [data-overlay-mode="map-result"][data-overlay-tone="negative"] {
      --overlay-accent: #f28d84;
      --overlay-border: rgba(242, 141, 132, 0.34);
      --overlay-muted: #ddbeb9;
    }

    @keyframes slideInFromRight {
      from {
        opacity: 0;
        transform: translateX(110%) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes slideOutToRight {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateX(110%) scale(0.98);
      }
    }
  </style>
</head>
<body>
  <main class="overlay-card" data-overlay-state="waiting" data-overlay-mode="runtime" data-overlay-tone="neutral" aria-live="polite">
    <section class="overlay-content">
      <div class="overlay-kicker" data-overlay-kicker>
        <span class="overlay-kicker-label" data-overlay-kicker-label>Juice Journal</span>
        <div class="overlay-actions">
          <button class="overlay-pin" type="button" data-overlay-pin aria-pressed="false" hidden>Pin</button>
          <button class="overlay-dismiss" type="button" data-overlay-dismiss hidden>Dismiss</button>
        </div>
      </div>
      <div class="overlay-primary" data-overlay-primary>Waiting for game</div>
      <div class="overlay-secondary-row">
        <span class="overlay-secondary" data-overlay-secondary>Waiting for runtime session</span>
        <span class="overlay-meta" data-overlay-meta></span>
      </div>
      <form class="overlay-start-form" data-overlay-start-form hidden>
        <label class="overlay-field">
          <span>Map</span>
          <input type="text" data-overlay-start-map-name autocomplete="off" spellcheck="false">
        </label>
        <label class="overlay-field">
          <span>Farm Type</span>
          <select data-overlay-start-farm-type></select>
        </label>
        <div class="overlay-start-actions">
          <button class="overlay-start-action" type="button" data-overlay-start-cancel>Cancel</button>
          <button class="overlay-start-action primary" type="submit" data-overlay-start-submit>Start Map</button>
        </div>
      </form>
    </section>
  </main>
  <script src="modules/overlayStateModel.js"></script>
  <script src="modules/profitCurrencyModel.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
