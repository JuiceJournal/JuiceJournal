<!DOCTYPE html>
<html lang="en" data-overlay-visibility="waiting">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juice Journal Overlay</title>
  <style>
    :root {
      --overlay-bg: rgba(10, 12, 16, 0.74);
      --overlay-border: rgba(230, 177, 92, 0.38);
      --overlay-text: #f7ead2;
      --overlay-muted: #b79f78;
      --overlay-accent: #e7a94f;
      --overlay-shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      color: var(--overlay-text);
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      pointer-events: none;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .overlay-card {
      width: 100%;
      min-height: 88px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--overlay-border);
      border-radius: 16px;
      background:
        radial-gradient(circle at 14% 0%, rgba(231, 169, 79, 0.24), transparent 32%),
        linear-gradient(135deg, rgba(16, 18, 24, 0.88), var(--overlay-bg));
      box-shadow: 0 16px 34px var(--overlay-shadow);
      backdrop-filter: blur(14px);
      opacity: 1;
      transform: translateY(0);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .overlay-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(231, 169, 79, 0.16), transparent 38%, rgba(255, 255, 255, 0.06));
      mix-blend-mode: screen;
    }

    .overlay-content {
      position: relative;
      display: grid;
      gap: 6px;
      padding: 13px 15px 12px;
    }

    .overlay-kicker {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--overlay-accent);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .overlay-kicker::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 12px currentColor;
    }

    .overlay-primary {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .overlay-secondary-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      color: var(--overlay-muted);
      font-family: "Trebuchet MS", Verdana, sans-serif;
      font-size: 12px;
    }

    .overlay-secondary,
    .overlay-meta {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .overlay-meta {
      flex: 0 0 auto;
      color: #e4c48c;
    }

    [data-overlay-state="waiting"] {
      --overlay-accent: #8bb2d8;
      --overlay-border: rgba(139, 178, 216, 0.28);
    }

    [data-overlay-state="hidden"] {
      opacity: 0;
      transform: translateY(4px);
    }
  </style>
</head>
<body>
  <main class="overlay-card" data-overlay-state="waiting" aria-live="polite">
    <section class="overlay-content">
      <div class="overlay-kicker">Juice Journal</div>
      <div class="overlay-primary" data-overlay-primary>Waiting for game</div>
      <div class="overlay-secondary-row">
        <span class="overlay-secondary" data-overlay-secondary>Waiting for runtime session</span>
        <span class="overlay-meta" data-overlay-meta></span>
      </div>
    </section>
  </main>
  <script src="modules/overlayStateModel.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
